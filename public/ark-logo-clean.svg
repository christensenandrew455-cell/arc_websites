<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">ARK Websites Logo</title>
  <desc id="desc">A clean front-facing laptop with ARK on the screen.</desc>

  <defs>
    <linearGradient id="screenGradient" x1="150" y1="145" x2="362" y2="295" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="bodyGradient" x1="103" y1="333" x2="409" y2="409" gradientUnits="userSpaceOnUse">
      <stop stop-color="#CBD5E1"/>
      <stop offset="1" stop-color="#64748B"/>
    </linearGradient>
    <filter id="shadow" x="60" y="80" width="392" height="370" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#0F172A" flood-opacity="0.24"/>
    </filter>
  </defs>

  <rect width="512" height="512" rx="112" fill="#F8FAFC"/>
  <circle cx="256" cy="256" r="206" fill="#EFF6FF"/>

