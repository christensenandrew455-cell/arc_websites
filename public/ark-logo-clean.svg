    <text x="256" y="238" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="76" font-weight="900" letter-spacing="4" fill="#FFFFFF">ARK</text>
    <path d="M194 258H318" stroke="#22C55E" stroke-width="7" stroke-linecap="round"/>

    <path d="M103 333H409L441 391C445 399 439 409 430 409H82C73 409 67 399 71 391L103 333Z" fill="url(#bodyGradient)"/>
    <path d="M103 333H409L423 359H89L103 333Z" fill="#94A3B8"/>
    <path d="M206 373H306L317 392H195L206 373Z" fill="#475569" opacity="0.8"/>
    <rect x="126" y="315" width="260" height="18" fill="#0F172A" opacity="0.18"/>
  </g>
